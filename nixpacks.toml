[providers.php]

[variables]
  NIXPACKS_PHP_MEMORY_LIMIT = "256M"
  NIXPACKS_PHP_UPLOAD_MAX_FILESIZE = "20M"
  NIXPACKS_PHP_POST_MAX_SIZE = "20M"

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --quiet; php artisan serve --host=0.0.0.0 --port=$PORT"
